<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Runebender</title>
    <meta name="description" content="Runebender — a WebGPU font editor in the browser, ported from runebender-xilem." />

    <!-- Social cards. Absolute URLs so scrapers resolve them; this
         standalone build is canonical home is runebender.org. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Runebender" />
    <meta property="og:description" content="A WebGPU font editor in the browser, ported from runebender-xilem." />
    <meta property="og:url" content="https://runebender.org/" />
    <meta property="og:image" content="https://runebender.org/rb.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Runebender" />
    <meta name="twitter:description" content="A WebGPU font editor in the browser, ported from runebender-xilem." />
    <meta name="twitter:image" content="https://runebender.org/rb.png" />
    <style>
      html, body, #app { height: 100%; margin: 0; padding: 0; }
      body {
        background: #101010;
        color: #909090;
        font: 13px ui-sans-serif, system-ui, sans-serif;
      }

      /* Hairline scrollbars — no track, thin mid-gray thumb that
         blends into the dark panel background. Same pattern as
         ~/Notes/dashboard, tuned for the xilem grayscale palette. */
      @supports (-moz-appearance: none) {
        * {
          scrollbar-width: thin;
          scrollbar-color: #505050 transparent;
        }
      }
      ::-webkit-scrollbar { width: 6px; height: 6px; background: transparent; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: #505050;
        border-radius: 999px;
        border: 1.5px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #707070;
        border: 1.5px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-corner { background: transparent; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
